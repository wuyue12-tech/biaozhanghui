<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>八升九入境仪式流程图</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #152334;
      --muted: #5f6b7a;
      --line: #d8e0ea;
      --blue: #eaf4ff;
      --green: #e9f8f0;
      --red: #fff0f2;
      --amber: #fff7e6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.55;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 28px 60px;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
      font-weight: 720;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 20px 0 28px;
    }

    .legend span {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      font-size: 14px;
    }

    .blue { background: var(--blue); }
    .green { background: var(--green); }
    .red { background: var(--red); }
    .amber { background: var(--amber); }

    section {
      margin: 34px 0 44px;
    }

    h2 {
      font-size: 22px;
      margin: 0 0 6px;
    }

    .note {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .diagram {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 18px;
    }

    .diagram img {
      display: block;
      max-width: none;
      min-width: 760px;
      margin: 0 auto;
    }

    .checklist {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .checklist div {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 14px;
      background: #fafcff;
    }

    .checklist strong {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 760px) {
      main {
        padding: 24px 16px 40px;
      }

      .legend,
      .checklist {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>八升九入境仪式流程图</h1>
      <p class="lead">读图主线：学生共创 → 团队闯关 → 家长见证 → 导师认证。图中红色节点是现场最容易出问题的位置。</p>
    </header>

    <div class="legend" aria-label="图例">
      <span class="blue">蓝色：正常流程与任务产出</span>
      <span class="green">绿色：完成与后续使用</span>
      <span class="red">红色：现场风险与补救口令</span>
      <span class="amber">黄色：活动前仍需确认</span>
    </div>

    <section>
      <h2>一、主流程图</h2>
      <p class="note">这张图看活动如何从前期共创推进到三关解锁、导师认证和后续使用。</p>
      <div class="diagram">
        <img src="入境仪式主流程图.svg" alt="八升九入境仪式主流程图">
      </div>
    </section>

    <section>
      <h2>二、风险检查图</h2>
      <p class="note">这张图看方案中最容易出现漏洞的位置，以及当前已有的控制点。</p>
      <div class="diagram">
        <img src="入境仪式风险检查图.svg" alt="八升九入境仪式风险检查图">
      </div>
      <div class="checklist">
        <div>
          <strong>现场最关键的三件事</strong>
          动线、验收标准、家长介入时间。
        </div>
        <div>
          <strong>活动前必须确认</strong>
          篮球馆尺寸、家长人数、导师岗位理解、软球和路线卡。
        </div>
      </div>
    </section>
  </main>
</body>
</html>
